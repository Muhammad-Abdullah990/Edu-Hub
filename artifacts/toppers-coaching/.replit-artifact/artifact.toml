kind = "web"
previewPath = "/"
title = "Toppers Coaching Center"
version = "1.0.0"
id = "artifacts/toppers-coaching"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20099

[services.development]
run = "pnpm --filter @workspace/toppers-coaching run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toppers-coaching", "run", "build" ]
publicDir = "artifacts/toppers-coaching/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20099"
BASE_PATH = "/"
